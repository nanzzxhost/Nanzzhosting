<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanzzxhosting Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-color: #000000;
            background-image: radial-gradient(circle at 2px 2px, #222 1px, transparent 0);
            background-size: 30px 30px;
            background-attachment: fixed; 
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 2. Tempat Logo Besarin dan Kasih Huruf N */
        .logo-circle {
            width: 70px; /* Diperbesar */
            height: 70px; /* Diperbesar */
            border-radius: 50%;
            border: 3px solid #00f2ff;
            box-shadow: 0 0 20px #00f2ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px; /* Ukuran huruf N */
            font-weight: bold;
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
        }

        /* 1. Ganti nama ke Nanzzxhosting */
        .title {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 5px;
            text-align: center;
        }
        .title .blue { color: #00f2ff; }
        .title .purple { color: #a020f0; }

        .subtitle {
            font-size: 10px;
            letter-spacing: 4px;
            color: #ccc;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Container & Cards - TETAP TIDAK BERUBAH */
        .container {
            width: 100%;
            max-width: 400px;
            margin-top: 30px;
        }

        .card {
            background: #111111;
            border: 1px solid #222;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .blue-icon { color: #2196f3; }
        .orange-icon { color: #ff9800; }

        .input-group { margin-bottom: 15px; }
        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .btn-result {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00c6ff, #9d50bb);
            color: black;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-email {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: white;
            color: black;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .footer-text {
            color: #a020f0;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            font-size: 14px;
        }

        .table-head {
            display: flex;
            justify-content: space-between;
            color: #2196f3;
            font-size: 11px;
            font-weight: bold;
            margin-top: 15px;
            padding: 0 10px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            padding: 12px 10px;
            border-bottom: 1px solid #222;
            color: #eee;
        }

        .del-btn {
            color: #ff4444;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            padding-left: 15px;
        }

        /* Pop-up Animasi */
        #popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 1px solid #333;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .show-popup {
            display: block !important;
            animation: popAnim 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .check-icon {
            font-size: 40px;
            color: #00f2ff;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="popup">
        <div class="check-icon">✓</div>
        <div style="font-weight: bold; color: white;">BERHASIL</div>
    </div>

    <div class="logo-circle">N</div>
    
    <div class="title"><span class="blue">NANZZ</span><span class="purple">XHOSTING</span></div>
    <div class="subtitle">Result Gacor Nanzzxhosting</div>

    <div class="container">
        <div class="card">
            <div class="card-header blue-icon"><span>💳 DATA RESULT</span></div>
            <div class="input-group">
                <label>Nama Result</label>
                <input type="text" id="resName" value="Result Admin Nanzz">
            </div>
            <div class="input-group">
                <label>Sender Murni</label>
                <input type="text" id="resSender" placeholder="admin@nanzz">
            </div>
            <button class="btn-result" onclick="showPopup()">Ganti Data Result</button>
        </div>

        <div class="card">
            <div class="card-header orange-icon"><span>✉️ DATA EMAIL</span></div>
            <div class="input-group">
                <label>Email Target</label>
                <input type="email" id="emailInput" placeholder="nanzzxhosting@gmail">
            </div>
            <div class="input-group">
                <label>Result Jasteb</label>
                <input type="number" id="limitInput" value="1">
            </div>
            <button class="btn-email" onclick="addEmail()">Add New Email</button>
        </div>

        <div class="footer-text">Daftar Email Aktif</div>
        <div class="table-head">
            <span>EMAIL</span>
            <span>LIMIT / HAPUS</span>
        </div>
        <hr style="border: 0.5px solid #222; margin-top: 5px;">
        
        <div id="emailList"></div>
    </div>

    <script>
        function showPopup() {
            const pop = document.getElementById('popup');
            pop.classList.add('show-popup');
            setTimeout(() => { 
                pop.classList.remove('show-popup');
            }, 1500);
        }

        function addEmail() {
            const email = document.getElementById('emailInput').value;
            const limit = document.getElementById('limitInput').value;

            if(email.trim() === "") return;

            const list = document.getElementById('emailList');
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `
                <span>${email}</span> 
                <div>
                    <span>${limit}</span>
                    <span class="del-btn" onclick="this.parentElement.parentElement.remove()">✕</span>
                </div>`;
            list.prepend(item);

            showPopup();
            document.getElementById('emailInput').value = "";
        }
    </script>
</body>
</html>
